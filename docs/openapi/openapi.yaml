    get:
      summary: List durable eval runs
      description: |
        Returns one tenant-scoped page of durable eval-run records.
        This lane is intentionally lightweight and does not inline execution payloads or judge output.
        Terminal rows may include `result_summary`, a compact pass/fail overview derived from durable
        `item_results`, while queued and running rows stay lightweight and omit that summary.
      operationId: listEvalRuns
      parameters:
        - name: tenant_id
          in: query
          required: true
          schema:
            type: string
        - name: dataset_id
          in: query
          required: false
          schema:
            type: string
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum:
              - queued
              - running
              - succeeded
              - failed
        - name: needs_follow_up
          in: query
          required: false
          schema:
            type: boolean
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 20
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        '200':
          description: Eval-run page returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListEvalRunsResponse'
        '400':
          description: Query was invalid.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '405':
          description: Method not allowed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Eval run list failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
