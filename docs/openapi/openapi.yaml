openapi: 3.1.0
info:
  title: OpsPilot-Go API
  version: 0.1.0
  description: Minimal Foundation and Milestone 1 API surface for the OpsPilot-Go development kit.
servers:
  - url: http://localhost:18080
paths:
  /healthz:
    get:
      summary: Liveness probe
      operationId: getHealth
      responses:
        '200':
          description: Service is alive.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
  /readyz:
    get:
      summary: Readiness probe
      operationId: getReady
      responses:
        '200':
          description: Service is ready.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
  /api/v1/sessions:
    post:
      summary: Create a chat session
      operationId: createSession
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSessionRequest'
      responses:
        '201':
          description: Session created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateSessionResponse'
        '400':
          description: Request body was invalid JSON.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '405':
          description: Method not allowed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Session creation failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/sessions/{session_id}/messages:
    get:
      summary: List messages for a session
      operationId: listSessionMessages
      parameters:
        - name: session_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Messages returned in append order.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListMessagesResponse'
        '404':
          description: Session not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '405':
          description: Method not allowed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/chat/stream:
    post:
      summary: Start the synchronous chat skeleton stream
      description: |
        Returns a short placeholder SSE stream with runtime milestone events.
        The current Milestone 1 implementation persists user and assistant messages
        in the in-memory session store.
      operationId: streamChat
      parameters:
        - name: X-Request-Id
          in: header
          required: false
          schema:
            type: string
        - name: X-Trace-Id
          in: header
          required: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatStreamRequest'
      responses:
        '200':
          description: Server-sent event stream with placeholder response events.
          headers:
            X-Request-Id:
              description: Request correlation identifier.
              schema:
                type: string
            X-Trace-Id:
              description: Trace correlation identifier.
              schema:
                type: string
          content:
            text/event-stream:
              schema:
                type: string
                example: |-
                  event: meta
                  data: {"request_id":"req-1","session_id":"sess-1","trace_id":"trace-1"}

                  event: plan
                  data: {"plan_id":"plan-req-1","intent":"knowledge_qa","requires_retrieval":"true","requires_tool":"false","requires_workflow":"false"}

                  event: retrieval
                  data: {"query_used":"incident sop","evidence_count":"0"}

                  event: tool
                  data: {"tool_name":"ticket_search","status":"succeeded"}

                  event: task_promoted
                  data: {"task_id":"task-1","status":"queued","reason":"workflow_required"}

                  event: state
                  data: {"state":"completed"}

                  event: done
                  data: {"content":"Milestone 1 placeholder response.","session_id":"sess-1"}
        '400':
          description: Request body was invalid JSON.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Provided session was not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '405':
          description: Method not allowed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Streaming unsupported or chat handling failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/tasks:
    get:
      summary: List async task records
      description: |
        Returns operator-facing task rows ordered by `updated_at` descending.
        The list surface is intentionally lighter than `GET /api/v1/tasks/{task_id}` and omits `audit_events`.
      operationId: listTasks
      parameters:
        - name: tenant_id
          in: query
          required: true
          schema:
            type: string
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum:
              - queued
              - running
              - succeeded
              - failed
              - waiting_approval
        - name: task_type
          in: query
          required: false
          schema:
            type: string
            enum:
              - report_generation
              - approved_tool_execution
        - name: reason
          in: query
          required: false
          schema:
            type: string
            enum:
              - workflow_required
              - approval_required
        - name: requires_approval
          in: query
          required: false
          schema:
            type: boolean
        - name: created_after
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: created_before
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: updated_after
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: updated_before
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 20
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        '200':
          description: Filtered task rows returned with offset pagination metadata.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskListResponse'
        '400':
          description: Query parameters were invalid.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '405':
          description: Method not allowed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Task listing failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      summary: Create an async task record
      description: |
        Creates a PostgreSQL-backed workflow task record for the current skeleton.
        This endpoint does not yet start a durable Temporal workflow.
      operationId: createTask
      parameters:
        - name: X-Request-Id
          in: header
          required: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTaskRequest'
      responses:
        '201':
          description: Task record created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '400':
          description: Request body was invalid JSON.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '405':
          description: Method not allowed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Task creation failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/tasks/{task_id}:
    get:
      summary: Get an async task record
      description: |
        Returns the current PostgreSQL-backed task status for the current skeleton.
        This endpoint will later front durable Temporal-backed task status.
      operationId: getTask
      parameters:
        - name: task_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Task record returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '404':
          description: Task not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '405':
          description: Method not allowed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Task lookup failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/tasks/{task_id}/approve:
    post:
      summary: Approve a waiting task
      description: |
        Resumes a `waiting_approval` task back into the queued state so the worker can execute it.
      operationId: approveTask
      parameters:
        - name: task_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApproveTaskRequest'
      responses:
        '200':
          description: Task approved and re-queued.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '400':
          description: Request body was invalid JSON.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Task not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Task is not in a valid state for approval.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/tasks/{task_id}/retry:
    post:
      summary: Retry a failed task
      description: |
        Re-queues a `failed` task for another worker attempt and clears the prior error reason.
      operationId: retryTask
      parameters:
        - name: task_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RetryTaskRequest'
      responses:
        '200':
          description: Task re-queued for retry.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '400':
          description: Request body was invalid JSON.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Task not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Task is not in a valid state for retry.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/versions:
    get:
      summary: List durable runtime versions
      description: |
        Returns durable runtime version snapshots ordered by `created_at` descending.
        This is the canonical registry for reproducibility metadata such as planner, retrieval,
        tool, critic, and workflow version references.
      operationId: listVersions
      parameters:
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 20
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        '200':
          description: Version page returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListVersionsResponse'
        '400':
          description: Invalid query.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '405':
          description: Method not allowed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Version list failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/versions/{version_id}:
    get:
      summary: Get a durable runtime version
      description: |
        Returns one durable runtime version snapshot by stable `version_id`.
        Operators use this contract to explain which runtime bundle produced a task, report, or trace drill-down.
      operationId: getVersion
      parameters:
        - name: version_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Version returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Version'
        '404':
          description: Version not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '405':
          description: Method not allowed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Version lookup failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/reports:
    get:
      summary: List durable reports
      description: |
        Returns durable report artifacts with simple filter and offset pagination support.
        This endpoint is the canonical report list surface and stays separate from workflow task lists.
      operationId: listReports
      parameters:
        - name: tenant_id
          in: query
          required: false
          schema:
            type: string
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum:
              - ready
        - name: report_type
          in: query
          required: false
          schema:
            type: string
            enum:
              - workflow_summary
        - name: source_task_id
          in: query
          required: false
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
      responses:
        '200':
          description: Report page returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListReportsResponse'
        '400':
          description: Invalid query.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '405':
          description: Method not allowed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Report list failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/report-compare:
    get:
      summary: Compare two durable reports
      description: |
        Returns a read-only comparison between two durable report artifacts.
        This endpoint stays separate from report execution provenance so operators can compare artifacts without replaying workflow history in the client.
      operationId: compareReports
      parameters:
        - name: left_report_id
          in: query
          required: true
          schema:
            type: string
        - name: right_report_id
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Report comparison returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ReportComparison'
        '400':
          description: Invalid query.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: One or both reports not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '405':
          description: Method not allowed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Report comparison failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/trace-drilldown:
    get:
      summary: Resolve durable trace drill-down context
      description: |
        Returns the current durable lineage and provenance pointers for exactly one task, report, or case.
        This endpoint is intentionally narrow: it surfaces request/session correlation, audit ref, warnings, and the current Temporal pointer without reconstructing a full trace timeline.
      operationId: getTraceDrilldown
      parameters:
        - name: task_id
          in: query
          required: false
          schema:
            type: string
        - name: report_id
          in: query
          required: false
          schema:
            type: string
        - name: case_id
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Trace drill-down returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TraceDrilldown'
        '400':
          description: Invalid query.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Trace subject not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '405':
          description: Method not allowed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Trace lookup failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/reports/{report_id}:
    get:
      summary: Get a generated report
      description: |
        Returns the durable read model emitted by a successful `report_generation` task.
        This endpoint is separate from task status so report consumers do not need to infer report metadata from task audit history.
      operationId: getReport
      parameters:
        - name: report_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Report returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Report'
        '404':
          description: Report not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '405':
          description: Method not allowed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Report lookup failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/cases:
    get:
      summary: List durable operator cases
      description: |
        Returns operator-facing case rows ordered by `updated_at` descending.
        The current minimal case slice supports tenant, status, source-link filters, eval-backed queue filters, and offset pagination.
      operationId: listCases
      parameters:
        - name: tenant_id
          in: query
          required: true
          schema:
            type: string
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum:
              - open
              - closed
        - name: assigned_to
          in: query
          required: false
          schema:
            type: string
        - name: unassigned_only
          in: query
          required: false
          schema:
            type: boolean
        - name: source_task_id
          in: query
          required: false
          schema:
            type: string
        - name: source_report_id
          in: query
          required: false
          schema:
            type: string
        - name: source_eval_report_id
          in: query
          required: false
          schema:
            type: string
        - name: source_eval_case_id
          in: query
          required: false
          schema:
            type: string
        - name: source_eval_run_id
          in: query
          required: false
          schema:
            type: string
        - name: source_eval_dataset_id
          in: query
          required: false
          schema:
            type: string
        - name: eval_backed_only
          in: query
          required: false
          schema:
            type: boolean
        - name: run_backed_only
          in: query
          required: false
          schema:
            type: boolean
        - name: compare_origin_only
          in: query
          required: false
          schema:
            type: boolean
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 20
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        '200':
          description: Filtered cases returned with offset pagination metadata.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CaseListResponse'
        '400':
          description: Query parameters were invalid.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '405':
          description: Method not allowed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Case list failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      summary: Create a durable operator case
      description: |
        Creates a durable case record that can link a source task, a source report, a source eval report, or a valid combination of those canonical lineage pointers.
        The current slice keeps cases as operator-managed read models without workflow automation.
        When `source_eval_case_id` is provided, the API reuses the newest open follow-up case for the same `tenant_id + source_eval_case_id` instead of creating a duplicate.
        When `source_eval_report_id` is provided without `source_eval_case_id` or `compare_origin`, the API reuses the newest open follow-up case for the same `tenant_id + source_eval_report_id` instead of creating a duplicate.
        When `compare_origin` is provided, the API reuses the newest open compare-derived follow-up case for the same `tenant_id + source_eval_report_id + compare_origin(left/right/selected_side)` instead of creating a duplicate.
      operationId: createCase
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCaseRequest'
      responses:
        '200':
          description: Existing open follow-up case reused for the same tenant-scoped eval lineage, including exact compare-origin lineage when provided.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Case'
        '201':
          description: Case created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Case'
        '400':
          description: Request body or required fields were invalid.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Referenced source task, report, or eval report was not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '405':
          description: Method not allowed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Referenced source lineage was invalid for the requested tenant or report/task pair.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Case creation failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/cases/{case_id}:
    get:
      summary: Get a durable operator case
      operationId: getCase
      parameters:
        - name: case_id
          in: path
          required: true
          schema:
            type: string
        - name: tenant_id
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Case returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Case'
        '404':
          description: Case not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '400':
          description: Query parameters were invalid.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '405':
          description: Method not allowed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Case lookup failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/cases/{case_id}/close:
    post:
      summary: Close a durable operator case
      operationId: closeCase
      parameters:
        - name: case_id
          in: path
          required: true
          schema:
            type: string
        - name: tenant_id
          in: query
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CloseCaseRequest'
      responses:
        '200':
          description: Case closed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Case'
        '400':
          description: Request body or query parameters were invalid.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Case not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '405':
          description: Method not allowed.
          content:
            application/json:
              schema:
