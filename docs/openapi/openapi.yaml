openapi: 3.1.0
info:
  title: OpsPilot-Go API
  version: 0.1.0
  description: Minimal Foundation and Milestone 1 API surface for the OpsPilot-Go development kit.
servers:
  - url: http://localhost:18080
paths:
  /healthz:
    get:
      summary: Liveness probe
      operationId: getHealth
      responses:
        '200':
          description: Service is alive.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
  /readyz:
    get:
      summary: Readiness probe
      operationId: getReady
      responses:
        '200':
          description: Service is ready.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
  /api/v1/sessions:
    post:
      summary: Create a chat session
      operationId: createSession
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSessionRequest'
      responses:
        '201':
          description: Session created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateSessionResponse'
        '400':
          description: Request body was invalid JSON.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '405':
          description: Method not allowed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Session creation failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/sessions/{session_id}/messages:
    get:
      summary: List messages for a session
      operationId: listSessionMessages
      parameters:
        - name: session_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Messages returned in append order.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListMessagesResponse'
        '404':
          description: Session not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '405':
          description: Method not allowed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/chat/stream:
    post:
      summary: Start the synchronous chat skeleton stream
      description: |
        Returns a short placeholder SSE stream with runtime milestone events.
        The current Milestone 1 implementation persists user and assistant messages
        in the in-memory session store.
      operationId: streamChat
      parameters:
        - name: X-Request-Id
          in: header
          required: false
          schema:
            type: string
        - name: X-Trace-Id
          in: header
          required: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatStreamRequest'
      responses:
        '200':
          description: Server-sent event stream with placeholder response events.
          headers:
            X-Request-Id:
              description: Request correlation identifier.
              schema:
                type: string
            X-Trace-Id:
              description: Trace correlation identifier.
              schema:
                type: string
          content:
            text/event-stream:
              schema:
                type: string
                example: |-
                  event: meta
                  data: {"request_id":"req-1","session_id":"sess-1","trace_id":"trace-1"}

                  event: plan
                  data: {"plan_id":"plan-req-1","intent":"knowledge_qa","requires_retrieval":"true","requires_tool":"false","requires_workflow":"false"}

                  event: retrieval
                  data: {"query_used":"incident sop","evidence_count":"0"}

                  event: tool
                  data: {"tool_name":"ticket_search","status":"succeeded"}

                  event: task_promoted
                  data: {"task_id":"task-1","status":"queued","reason":"workflow_required"}

                  event: state
                  data: {"state":"completed"}

                  event: done
                  data: {"content":"Milestone 1 placeholder response.","session_id":"sess-1"}
        '400':
          description: Request body was invalid JSON.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Provided session was not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '405':
          description: Method not allowed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Streaming unsupported or chat handling failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/tasks:
    get:
      summary: List async task records
      description: |
        Returns operator-facing task rows ordered by `updated_at` descending.
        The list surface is intentionally lighter than `GET /api/v1/tasks/{task_id}` and omits `audit_events`.
      operationId: listTasks
      parameters:
        - name: tenant_id
          in: query
          required: true
          schema:
            type: string
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum:
              - queued
              - running
              - succeeded
              - failed
              - waiting_approval
        - name: task_type
          in: query
          required: false
          schema:
            type: string
            enum:
              - report_generation
              - approved_tool_execution
        - name: reason
          in: query
          required: false
          schema:
            type: string
            enum:
              - workflow_required
              - approval_required
        - name: requires_approval
          in: query
          required: false
          schema:
            type: boolean
        - name: created_after
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: created_before
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: updated_after
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: updated_before
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 20
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        '200':
          description: Filtered task rows returned with offset pagination metadata.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TaskListResponse'
        '400':
          description: Query parameters were invalid.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '405':
          description: Method not allowed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Task listing failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      summary: Create an async task record
      description: |
        Creates a PostgreSQL-backed workflow task record for the current skeleton.
        This endpoint does not yet start a durable Temporal workflow.
      operationId: createTask
      parameters:
        - name: X-Request-Id
          in: header
          required: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTaskRequest'
      responses:
        '201':
          description: Task record created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '400':
          description: Request body was invalid JSON.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '405':
          description: Method not allowed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Task creation failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/tasks/{task_id}:
    get:
      summary: Get an async task record
      description: |
        Returns the current PostgreSQL-backed task status for the current skeleton.
        This endpoint will later front durable Temporal-backed task status.
      operationId: getTask
      parameters:
        - name: task_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Task record returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '404':
          description: Task not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '405':
          description: Method not allowed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Task lookup failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/tasks/{task_id}/approve:
    post:
      summary: Approve a waiting task
      description: |
        Resumes a `waiting_approval` task back into the queued state so the worker can execute it.
      operationId: approveTask
      parameters:
        - name: task_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApproveTaskRequest'
      responses:
        '200':
          description: Task approved and re-queued.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '400':
          description: Request body was invalid JSON.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Task not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Task is not in a valid state for approval.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/tasks/{task_id}/retry:
    post:
      summary: Retry a failed task
      description: |
        Re-queues a `failed` task for another worker attempt and clears the prior error reason.
      operationId: retryTask
      parameters:
        - name: task_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RetryTaskRequest'
      responses:
        '200':
          description: Task re-queued for retry.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '400':
          description: Request body was invalid JSON.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Task not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Task is not in a valid state for retry.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/reports/{report_id}:
    get:
      summary: Get a generated report
      description: |
        Returns the durable read model emitted by a successful `report_generation` task.
        This endpoint is separate from task status so report consumers do not need to infer report metadata from task audit history.
      operationId: getReport
      parameters:
        - name: report_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Report returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Report'
        '404':
          description: Report not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '405':
          description: Method not allowed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Report lookup failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/cases:
    get:
      summary: List durable operator cases
      description: |
        Returns operator-facing case rows ordered by `updated_at` descending.
        The current minimal case slice supports tenant, status, and source-link filters plus offset pagination.
      operationId: listCases
      parameters:
        - name: tenant_id
          in: query
          required: false
          schema:
            type: string
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum:
              - open
        - name: source_task_id
          in: query
          required: false
          schema:
            type: string
        - name: source_report_id
          in: query
          required: false
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 20
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        '200':
          description: Filtered cases returned with offset pagination metadata.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CaseListResponse'
        '400':
          description: Query parameters were invalid.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '405':
          description: Method not allowed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Case list failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      summary: Create a durable operator case
      description: |
        Creates a durable case record that can link a source task, a source report, or both.
        The current slice keeps cases as operator-managed read models without workflow automation.
      operationId: createCase
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCaseRequest'
      responses:
        '201':
          description: Case created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Case'
        '400':
          description: Request body or required fields were invalid.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Referenced source task or report was not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '405':
          description: Method not allowed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Referenced source lineage was invalid for the requested tenant or report/task pair.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Case creation failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/cases/{case_id}:
    get:
      summary: Get a durable operator case
      operationId: getCase
      parameters:
        - name: case_id
          in: path
          required: true
          schema:
            type: string
        - name: tenant_id
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Case returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Case'
        '404':
          description: Case not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '400':
          description: Query parameters were invalid.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '405':
          description: Method not allowed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Case lookup failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/admin/task-board:
    get:
      summary: Get the admin task board view
      description: |
        Returns an operator-facing task board read model built from the current filtered task page.
        This endpoint keeps summary counts and pagination metadata on the backend so `web/admin` can stay contract-driven.
      operationId: getAdminTaskBoard
      parameters:
        - name: tenant_id
          in: query
          required: false
          schema:
            type: string
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum:
              - queued
              - running
              - succeeded
              - failed
              - waiting_approval
        - name: task_type
          in: query
          required: false
          schema:
            type: string
            enum:
              - report_generation
              - approved_tool_execution
        - name: reason
          in: query
          required: false
          schema:
            type: string
            enum:
              - workflow_required
              - approval_required
        - name: requires_approval
          in: query
          required: false
          schema:
            type: boolean
        - name: created_after
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: created_before
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: updated_after
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: updated_before
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 20
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        '200':
          description: Admin task board returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminTaskBoard'
        '400':
          description: Query parameters were invalid.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '405':
          description: Method not allowed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Task board query failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  schemas:
    StatusResponse:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          examples:
            - ok
            - ready
    ErrorResponse:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
        message:
          type: string
    CreateSessionRequest:
      type: object
      properties:
        tenant_id:
          type: string
        user_id:
          type: string
    CreateSessionResponse:
      type: object
      required:
        - session_id
      properties:
        session_id:
          type: string
    Message:
      type: object
      required:
        - id
        - role
        - content
      properties:
        id:
          type: string
        role:
          type: string
          enum:
            - user
            - assistant
        content:
          type: string
    ListMessagesResponse:
      type: object
      required:
        - messages
      properties:
        messages:
          type: array
          items:
            $ref: '#/components/schemas/Message'
    ChatStreamRequest:
      type: object
      properties:
        tenant_id:
          type: string
        user_id:
          type: string
        session_id:
          type: string
        mode:
          type: string
          enum:
            - chat
            - task
        user_message:
          type: string
        attachment_refs:
          type: array
          items:
            type: string
        client_request_id:
          type: string
    CreateTaskRequest:
      type: object
      properties:
        tenant_id:
          type: string
        session_id:
          type: string
        task_type:
          type: string
          enum:
            - report_generation
            - approved_tool_execution
        reason:
          type: string
          enum:
            - workflow_required
            - approval_required
        requires_approval:
          type: boolean
    ApproveTaskRequest:
      type: object
      properties:
        approved_by:
          type: string
    RetryTaskRequest:
      type: object
      properties:
        retried_by:
          type: string
    TaskSummary:
      type: object
      required:
        - task_id
        - tenant_id
        - task_type
        - status
        - reason
        - requires_approval
        - created_at
        - updated_at
      properties:
        task_id:
          type: string
        request_id:
          type: string
        tenant_id:
          type: string
        session_id:
          type: string
        task_type:
          type: string
          enum:
            - report_generation
            - approved_tool_execution
        status:
          type: string
          enum:
            - queued
            - running
            - succeeded
            - failed
            - waiting_approval
        reason:
          type: string
          enum:
            - workflow_required
            - approval_required
        error_reason:
          type: string
        audit_ref:
          type: string
        requires_approval:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    TaskListResponse:
      type: object
      required:
        - tasks
        - has_more
      properties:
        tasks:
          type: array
          items:
            $ref: '#/components/schemas/TaskSummary'
        has_more:
          type: boolean
        next_offset:
          type: integer
          minimum: 0
    Task:
      allOf:
        - $ref: '#/components/schemas/TaskSummary'
        - type: object
          properties:
            audit_events:
              type: array
              items:
                $ref: '#/components/schemas/TaskAuditEvent'
    Report:
      type: object
      required:
        - report_id
        - tenant_id
        - source_task_id
        - report_type
        - status
        - title
        - summary
        - created_at
      properties:
        report_id:
          type: string
        tenant_id:
          type: string
        source_task_id:
          type: string
        report_type:
          type: string
          enum:
            - workflow_summary
        status:
          type: string
          enum:
            - ready
        title:
          type: string
        summary:
          type: string
        content_uri:
          type: string
        metadata:
          type: object
          additionalProperties: true
        created_by:
          type: string
        created_at:
          type: string
          format: date-time
        ready_at:
          type: string
          format: date-time
    CreateCaseRequest:
      type: object
      required:
        - tenant_id
        - title
      properties:
        tenant_id:
          type: string
        title:
          type: string
        summary:
          type: string
        source_task_id:
          type: string
        source_report_id:
          type: string
        created_by:
          type: string
    Case:
      type: object
      required:
        - case_id
        - tenant_id
        - status
        - title
        - summary
        - created_by
        - created_at
        - updated_at
      properties:
        case_id:
          type: string
        tenant_id:
          type: string
        status:
          type: string
          enum:
            - open
        title:
          type: string
        summary:
          type: string
        source_task_id:
          type: string
        source_report_id:
          type: string
        created_by:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    CaseListResponse:
      type: object
      required:
        - cases
        - has_more
      properties:
        cases:
          type: array
          items:
            $ref: '#/components/schemas/Case'
        has_more:
          type: boolean
        next_offset:
          type: integer
          minimum: 0
    TaskAuditEvent:
      type: object
      required:
        - id
        - action
        - created_at
      properties:
        id:
          type: integer
        action:
          type: string
          enum:
            - created
            - claimed
            - approved
            - retried
            - succeeded
            - failed
        actor:
          type: string
        detail:
          type: string
        created_at:
          type: string
          format: date-time
    AdminTaskBoard:
      type: object
      required:
        - items
        - page
        - summary
      properties:
        items:
          type: array
          items:
            $ref: '#/components/schemas/TaskSummary'
        page:
          $ref: '#/components/schemas/AdminTaskBoardPage'
        summary:
          $ref: '#/components/schemas/AdminTaskBoardSummary'
    AdminTaskBoardPage:
      type: object
      required:
        - has_more
      properties:
        has_more:
          type: boolean
        next_offset:
          type: integer
          minimum: 0
