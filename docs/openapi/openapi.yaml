          in: query
          required: false
          schema:
            type: string
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum:
              - queued
              - running
              - succeeded
              - failed
              - waiting_approval
        - name: task_type
          in: query
          required: false
          schema:
            type: string
            enum:
              - report_generation
              - approved_tool_execution
        - name: reason
          in: query
          required: false
          schema:
            type: string
            enum:
              - workflow_required
              - approval_required
        - name: requires_approval
          in: query
          required: false
          schema:
            type: boolean
        - name: created_after
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: created_before
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: updated_after
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: updated_before
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 20
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        '200':
          description: Admin task board returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminTaskBoard'
        '400':
          description: Query parameters were invalid.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '405':
          description: Method not allowed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Task board query failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  schemas:
    StatusResponse:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          examples:
            - ok
            - ready
    ErrorResponse:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
        message:
          type: string
    CreateSessionRequest:
      type: object
      properties:
        tenant_id:
          type: string
        user_id:
          type: string
    CreateSessionResponse:
      type: object
      required:
        - session_id
      properties:
        session_id:
          type: string
    Message:
      type: object
      required:
        - id
        - role
        - content
      properties:
        id:
          type: string
        role:
          type: string
          enum:
            - user
            - assistant
        content:
          type: string
    ListMessagesResponse:
      type: object
      required:
        - messages
      properties:
        messages:
          type: array
          items:
            $ref: '#/components/schemas/Message'
    ChatStreamRequest:
      type: object
      properties:
        tenant_id:
          type: string
        user_id:
          type: string
        session_id:
          type: string
        mode:
          type: string
          enum:
            - chat
            - task
        user_message:
          type: string
        attachment_refs:
          type: array
          items:
            type: string
        client_request_id:
          type: string
    CreateTaskRequest:
      type: object
      properties:
        tenant_id:
          type: string
        session_id:
          type: string
        task_type:
          type: string
          enum:
            - report_generation
            - approved_tool_execution
        reason:
          type: string
          enum:
            - workflow_required
            - approval_required
        requires_approval:
          type: boolean
    ApproveTaskRequest:
      type: object
      properties:
        approved_by:
          type: string
    RetryTaskRequest:
      type: object
      properties:
        retried_by:
          type: string
    TaskSummary:
      type: object
      required:
        - task_id
        - tenant_id
        - task_type
        - status
        - reason
        - requires_approval
        - created_at
        - updated_at
      properties:
        task_id:
          type: string
        request_id:
          type: string
        tenant_id:
          type: string
        session_id:
          type: string
        task_type:
          type: string
          enum:
            - report_generation
            - approved_tool_execution
        version_id:
          type: string
        status:
          type: string
          enum:
            - queued
            - running
            - succeeded
            - failed
            - waiting_approval
        reason:
          type: string
          enum:
            - workflow_required
            - approval_required
        error_reason:
          type: string
        audit_ref:
          type: string
        requires_approval:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    TaskListResponse:
      type: object
      required:
        - tasks
        - has_more
      properties:
        tasks:
          type: array
          items:
            $ref: '#/components/schemas/TaskSummary'
        has_more:
          type: boolean
        next_offset:
          type: integer
          minimum: 0
    Task:
      allOf:
        - $ref: '#/components/schemas/TaskSummary'
        - type: object
          properties:
            audit_events:
              type: array
              items:
                $ref: '#/components/schemas/TaskAuditEvent'
    Version:
      type: object
      required:
        - version_id
        - runtime_version
        - prompt_bundle
        - planner_version
        - retrieval_version
        - tool_registry_version
        - critic_version
        - workflow_version
        - created_at
      properties:
        version_id:
          type: string
        runtime_version:
          type: string
        provider:
          type: string
        model:
          type: string
        prompt_bundle:
          type: string
        planner_version:
          type: string
        retrieval_version:
          type: string
        tool_registry_version:
          type: string
        critic_version:
          type: string
        workflow_version:
          type: string
        notes:
          type: string
        created_at:
          type: string
          format: date-time
    ListVersionsResponse:
      type: object
      required:
        - versions
        - has_more
      properties:
        versions:
          type: array
          items:
            $ref: '#/components/schemas/Version'
        has_more:
          type: boolean
        next_offset:
          type: integer
          minimum: 0
    Report:
      type: object
      required:
        - report_id
        - tenant_id
        - source_task_id
        - report_type
        - status
        - title
        - summary
        - created_at
      properties:
        report_id:
          type: string
        tenant_id:
          type: string
        source_task_id:
          type: string
        version_id:
          type: string
        report_type:
          type: string
          enum:
            - workflow_summary
        status:
          type: string
          enum:
            - ready
        title:
          type: string
        summary:
          type: string
        content_uri:
          type: string
        metadata:
          type: object
          additionalProperties: true
        created_by:
          type: string
        created_at:
          type: string
          format: date-time
        ready_at:
          type: string
          format: date-time
    ListReportsResponse:
      type: object
      required:
        - reports
        - has_more
      properties:
        reports:
          type: array
          items:
            $ref: '#/components/schemas/Report'
        has_more:
          type: boolean
        next_offset:
          type: integer
    ReportComparisonSummary:
      type: object
      required:
        - same_tenant
        - same_report_type
        - version_changed
        - source_task_changed
        - title_changed
        - summary_changed
        - content_uri_changed
        - metadata_changed
        - created_at_changed
        - ready_at_changed
        - ready_at_delta_second
      properties:
        same_tenant:
          type: boolean
        same_report_type:
          type: boolean
        version_changed:
          type: boolean
        source_task_changed:
          type: boolean
        title_changed:
          type: boolean
        summary_changed:
          type: boolean
        content_uri_changed:
          type: boolean
        metadata_changed:
          type: boolean
        created_at_changed:
          type: boolean
        ready_at_changed:
          type: boolean
        ready_at_delta_second:
          type: integer
    ReportComparison:
      type: object
      required:
        - left
        - right
        - summary
      properties:
        left:
          $ref: '#/components/schemas/Report'
        right:
          $ref: '#/components/schemas/Report'
        summary:
          $ref: '#/components/schemas/ReportComparisonSummary'
    TraceDrilldownSubject:
      type: object
      required:
        - kind
        - id
      properties:
        kind:
          type: string
          enum:
            - task
            - report
            - case
        id:
          type: string
        tenant_id:
          type: string
    TraceDrilldownLineage:
      type: object
      properties:
        task_id:
          type: string
        report_id:
          type: string
        case_id:
          type: string
    TraceDrilldownTemporal:
      type: object
      required:
        - workflow_id
        - run_id
      properties:
        workflow_id:
          type: string
        run_id:
          type: string
    TraceDrilldown:
      type: object
      required:
        - subject
        - lineage
      properties:
        subject:
          $ref: '#/components/schemas/TraceDrilldownSubject'
        lineage:
          $ref: '#/components/schemas/TraceDrilldownLineage'
        version_id:
          type: string
        request_id:
          type: string
        session_id:
          type: string
        trace_id:
          type: string
        audit_ref:
          type: string
        task_status:
          type: string
        report_type:
          type: string
        report_status:
          type: string
        case_status:
          type: string
        temporal:
          $ref: '#/components/schemas/TraceDrilldownTemporal'
        warnings:
          type: array
          items:
            type: string
    CreateCaseRequest:
      type: object
      required:
        - tenant_id
        - title
      properties:
        tenant_id:
          type: string
        title:
          type: string
        summary:
          type: string
        source_task_id:
          type: string
        source_report_id:
          type: string
        created_by:
          type: string
    CloseCaseRequest:
      type: object
      properties:
        closed_by:
          type: string
    ReopenCaseRequest:
      type: object
      properties:
        reopened_by:
          type: string
    AssignCaseRequest:
      type: object
      required:
