          in: query
          required: false
          description: Filter the heavy `bad_cases` drill-down to only rows with open follow-up cases (`true`) or only rows without open follow-up cases (`false`).
          schema:
            type: boolean
      responses:
        '200':
          description: Eval report returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EvalReport'
        '400':
          description: Missing required tenant scope query.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Eval report not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '405':
          description: Method not allowed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Eval report lookup failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/eval-report-compare:
    get:
      summary: Compare two durable eval reports
      description: |
        Returns a narrow read-only comparison between two durable eval-report artifacts.
        The compare contract surfaces operator-facing deltas such as score change, bad-case overlap,
        judge-version drift, and metadata drift without forcing the browser to reconstruct report semantics.
      operationId: compareEvalReports
      parameters:
        - name: tenant_id
          in: query
          required: true
          schema:
            type: string
        - name: left_report_id
          in: query
          required: true
          schema:
            type: string
        - name: right_report_id
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Eval report comparison returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EvalReportComparison'
        '400':
          description: Query parameters were invalid or incomplete.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: One or both eval reports were not found for the tenant.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '405':
          description: Method not allowed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Eval report comparison failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/admin/task-board:
    get:
      summary: Get the admin task board view
      description: |
        Returns an operator-facing task board read model built from the current filtered task page.
        This endpoint keeps summary counts and pagination metadata on the backend so `web/admin` can stay contract-driven.
      operationId: getAdminTaskBoard
      parameters:
        - name: tenant_id
          in: query
          required: false
          schema:
            type: string
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum:
              - queued
              - running
              - succeeded
              - failed
              - waiting_approval
        - name: task_type
          in: query
          required: false
          schema:
            type: string
            enum:
              - report_generation
              - approved_tool_execution
        - name: reason
          in: query
          required: false
          schema:
            type: string
            enum:
              - workflow_required
              - approval_required
        - name: requires_approval
          in: query
          required: false
          schema:
            type: boolean
        - name: created_after
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: created_before
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: updated_after
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: updated_before
          in: query
          required: false
          schema:
            type: string
            format: date-time
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            default: 20
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        '200':
          description: Admin task board returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AdminTaskBoard'
        '400':
          description: Query parameters were invalid.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '405':
          description: Method not allowed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Task board query failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
