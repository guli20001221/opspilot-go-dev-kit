            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Eval case not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '405':
          description: Method not allowed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Eval case lookup failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/eval-datasets:
    get:
      summary: List durable eval datasets
