                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Eval dataset lookup failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/eval-datasets/{dataset_id}/publish:
    post:
      summary: Publish a durable eval dataset
      description: |
        Freezes a draft dataset into an immutable published baseline.
        Repeated publish attempts return an explicit invalid-state contract error.
      operationId: publishEvalDataset
      parameters:
        - name: dataset_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PublishEvalDatasetRequest'
      responses:
        '200':
          description: Dataset published and returned as the updated detail.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EvalDataset'
        '400':
          description: Request body was invalid.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Dataset not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
