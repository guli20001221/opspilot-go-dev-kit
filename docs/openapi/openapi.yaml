  /api/v1/eval-cases:
    get:
      summary: List durable eval cases
      description: |
        Returns one tenant-scoped page of durable eval-case promotions.
        Operators use this contract to browse promoted regression coverage before building datasets or regression runs.
      operationId: listEvalCases
      parameters:
        - name: tenant_id
          in: query
          required: true
          schema:
            type: string
        - name: source_case_id
          in: query
          required: false
          schema:
            type: string
        - name: source_task_id
          in: query
          required: false
          schema:
            type: string
        - name: source_report_id
          in: query
          required: false
          schema:
            type: string
        - name: version_id
          in: query
          required: false
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
        - name: offset
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
      responses:
        '200':
          description: Eval-case page returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListEvalCasesResponse'
        '400':
          description: Query was invalid.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '405':
          description: Method not allowed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Eval-case list failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      summary: Promote a durable case into eval coverage
      description: |
        Creates or reuses a durable eval case derived from an existing operator case.
        The backend copies stable lineage such as source task, source report, trace, and version metadata
        from canonical case and trace-drilldown sources instead of relying on frontend-only bookmarks.
      operationId: createEvalCase
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateEvalCaseRequest'
      responses:
        '200':
          description: Eval case already existed for the same source case and was returned idempotently.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EvalCase'
        '201':
          description: Eval case created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EvalCase'
        '400':
          description: Request body was invalid.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Source case not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '405':
          description: Method not allowed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Source case does not belong to the provided tenant scope.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Eval case promotion failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/eval-cases/{eval_case_id}:
    get:
