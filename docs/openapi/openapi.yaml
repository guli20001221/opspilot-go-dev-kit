        '405':
          description: Method not allowed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Eval dataset list failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
    post:
      summary: Create a durable eval dataset draft
      description: |
        Creates one draft eval dataset seeded from one or more durable eval cases.
        Operators use this contract to turn promoted failures into reusable regression assets.
      operationId: createEvalDataset
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateEvalDatasetRequest'
      responses:
        '201':
          description: Eval dataset created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EvalDataset'
        '400':
          description: Request body was invalid.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Eval case not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '405':
          description: Method not allowed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Eval dataset request is invalid for the provided tenant scope or membership set.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Eval dataset creation failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/eval-datasets/{dataset_id}:
    get:
      summary: Get a durable eval dataset
