openapi: 3.1.0
info:
  title: OpsPilot-Go API
  version: 0.1.0
  description: Minimal Foundation and Milestone 1 API surface for the OpsPilot-Go development kit.
servers:
  - url: http://localhost:18080
paths:
  /healthz:
    get:
      summary: Liveness probe
      operationId: getHealth
      responses:
        '200':
          description: Service is alive.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
  /readyz:
    get:
      summary: Readiness probe
      operationId: getReady
      responses:
        '200':
          description: Service is ready.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StatusResponse'
  /api/v1/sessions:
    post:
      summary: Create a chat session
      operationId: createSession
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSessionRequest'
      responses:
        '201':
          description: Session created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CreateSessionResponse'
        '400':
          description: Request body was invalid JSON.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '405':
          description: Method not allowed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Session creation failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/sessions/{session_id}/messages:
    get:
      summary: List messages for a session
      operationId: listSessionMessages
      parameters:
        - name: session_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Messages returned in append order.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ListMessagesResponse'
        '404':
          description: Session not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '405':
          description: Method not allowed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/chat/stream:
    post:
      summary: Start the synchronous chat skeleton stream
      description: |
        Returns a short placeholder SSE stream with runtime milestone events.
        The current Milestone 1 implementation persists user and assistant messages
        in the in-memory session store.
      operationId: streamChat
      parameters:
        - name: X-Request-Id
          in: header
          required: false
          schema:
            type: string
        - name: X-Trace-Id
          in: header
          required: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatStreamRequest'
      responses:
        '200':
          description: Server-sent event stream with placeholder response events.
          headers:
            X-Request-Id:
              description: Request correlation identifier.
              schema:
                type: string
            X-Trace-Id:
              description: Trace correlation identifier.
              schema:
                type: string
          content:
            text/event-stream:
              schema:
                type: string
                example: |-
                  event: meta
                  data: {"request_id":"req-1","session_id":"sess-1","trace_id":"trace-1"}

                  event: plan
                  data: {"plan_id":"plan-req-1","intent":"knowledge_qa","requires_retrieval":"true","requires_tool":"false","requires_workflow":"false"}

                  event: retrieval
                  data: {"query_used":"incident sop","evidence_count":"0"}

                  event: tool
                  data: {"tool_name":"ticket_search","status":"succeeded"}

                  event: task_promoted
                  data: {"task_id":"task-1","status":"queued","reason":"workflow_required"}

                  event: state
                  data: {"state":"completed"}

                  event: done
                  data: {"content":"Milestone 1 placeholder response.","session_id":"sess-1"}
        '400':
          description: Request body was invalid JSON.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Provided session was not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '405':
          description: Method not allowed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Streaming unsupported or chat handling failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/tasks:
    post:
      summary: Create an async task record
      description: |
        Creates a PostgreSQL-backed workflow task record for the current skeleton.
        This endpoint does not yet start a durable Temporal workflow.
      operationId: createTask
      parameters:
        - name: X-Request-Id
          in: header
          required: false
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateTaskRequest'
      responses:
        '201':
          description: Task record created.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '400':
          description: Request body was invalid JSON.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '405':
          description: Method not allowed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Task creation failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/tasks/{task_id}:
    get:
      summary: Get an async task record
      description: |
        Returns the current PostgreSQL-backed task status for the current skeleton.
        This endpoint will later front durable Temporal-backed task status.
      operationId: getTask
      parameters:
        - name: task_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Task record returned.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '404':
          description: Task not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '405':
          description: Method not allowed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Task lookup failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/tasks/{task_id}/approve:
    post:
      summary: Approve a waiting task
      description: |
        Resumes a `waiting_approval` task back into the queued state so the worker can execute it.
      operationId: approveTask
      parameters:
        - name: task_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ApproveTaskRequest'
      responses:
        '200':
          description: Task approved and re-queued.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '400':
          description: Request body was invalid JSON.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Task not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Task is not in a valid state for approval.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/tasks/{task_id}/retry:
    post:
      summary: Retry a failed task
      description: |
        Re-queues a `failed` task for another worker attempt and clears the prior error reason.
      operationId: retryTask
      parameters:
        - name: task_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RetryTaskRequest'
      responses:
        '200':
          description: Task re-queued for retry.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Task'
        '400':
          description: Request body was invalid JSON.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '404':
          description: Task not found.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '409':
          description: Task is not in a valid state for retry.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
components:
  schemas:
    StatusResponse:
      type: object
      required:
        - status
      properties:
        status:
          type: string
          examples:
            - ok
            - ready
    ErrorResponse:
      type: object
      required:
        - code
        - message
      properties:
        code:
          type: string
        message:
          type: string
    CreateSessionRequest:
      type: object
      properties:
        tenant_id:
          type: string
        user_id:
          type: string
    CreateSessionResponse:
      type: object
      required:
        - session_id
      properties:
        session_id:
          type: string
    Message:
      type: object
      required:
        - id
        - role
        - content
      properties:
        id:
          type: string
        role:
          type: string
          enum:
            - user
            - assistant
        content:
          type: string
    ListMessagesResponse:
      type: object
      required:
        - messages
      properties:
        messages:
          type: array
          items:
            $ref: '#/components/schemas/Message'
    ChatStreamRequest:
      type: object
      properties:
        tenant_id:
          type: string
        user_id:
          type: string
        session_id:
          type: string
        mode:
          type: string
          enum:
            - chat
            - task
        user_message:
          type: string
        attachment_refs:
          type: array
          items:
            type: string
        client_request_id:
          type: string
    CreateTaskRequest:
      type: object
      properties:
        tenant_id:
          type: string
        session_id:
          type: string
        task_type:
          type: string
          enum:
            - report_generation
            - approved_tool_execution
        reason:
          type: string
          enum:
            - workflow_required
            - approval_required
        requires_approval:
          type: boolean
    ApproveTaskRequest:
      type: object
      properties:
        approved_by:
          type: string
    RetryTaskRequest:
      type: object
      properties:
        retried_by:
          type: string
    Task:
      type: object
      required:
        - task_id
        - tenant_id
        - task_type
        - status
        - reason
        - requires_approval
        - created_at
        - updated_at
      properties:
        task_id:
          type: string
        request_id:
          type: string
        tenant_id:
          type: string
        session_id:
          type: string
        task_type:
          type: string
          enum:
            - report_generation
            - approved_tool_execution
        status:
          type: string
          enum:
            - queued
            - running
            - succeeded
            - failed
            - waiting_approval
        reason:
          type: string
          enum:
            - workflow_required
            - approval_required
        error_reason:
          type: string
        audit_ref:
          type: string
        requires_approval:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        audit_events:
          type: array
          items:
            $ref: '#/components/schemas/TaskAuditEvent'
    TaskAuditEvent:
      type: object
      required:
        - id
        - action
        - created_at
      properties:
        id:
          type: integer
        action:
          type: string
          enum:
            - created
            - claimed
            - approved
            - retried
            - succeeded
            - failed
        actor:
          type: string
        detail:
          type: string
        created_at:
          type: string
          format: date-time
