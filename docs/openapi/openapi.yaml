          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '405':
          description: Method not allowed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '500':
          description: Dataset publish failed.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
  /api/v1/eval-datasets/{dataset_id}/items:
    post:
      summary: Append one eval case into a durable dataset draft
      description: |
        Adds one durable eval case membership into an existing draft dataset.
        The append is idempotent for the same `dataset_id` and `eval_case_id`.
      operationId: addEvalDatasetItem
      parameters:
        - name: dataset_id
          in: path
