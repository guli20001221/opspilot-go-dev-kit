    get:
      summary: Get a durable eval run
      description: |
        Returns one durable eval run by stable ID.
        Operators use this contract to inspect lifecycle timestamps, failure reason,
        and the append-only event timeline as the worker advances and retries the run.
        When placeholder per-item results exist, the same run object also carries a lightweight
        `result_summary` alongside the heavier `item_results` detail payload.
