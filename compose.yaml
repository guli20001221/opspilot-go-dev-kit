services:
  ticket-api:
    build:
      context: .
      dockerfile: docker/ticketapi.Dockerfile
    environment:
      OPSPILOT_ENV: development
      OPSPILOT_LOG_LEVEL: INFO
      OPSPILOT_TICKET_API_LISTEN_ADDR: :8090
      OPSPILOT_TICKET_API_TOKEN: local-dev-ticket-token
    ports:
      - "${OPSPILOT_TICKET_API_PORT:-19090}:8090"

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: opspilot
      POSTGRES_PASSWORD: opspilot
      POSTGRES_DB: opspilot
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./db/migrations:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U opspilot -d opspilot"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  temporal-postgresql:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: temporal
      POSTGRES_PASSWORD: temporal
      POSTGRES_DB: temporal
    ports:
      - "5433:5432"
    volumes:
      - temporal-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temporal -d temporal"]
      interval: 5s
      timeout: 5s
      retries: 10

  temporal:
    image: temporalio/auto-setup:1.29.0
    depends_on:
      temporal-postgresql:
        condition: service_healthy
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_USER: temporal
      POSTGRES_PWD: temporal
      POSTGRES_SEEDS: temporal-postgresql
      DYNAMIC_CONFIG_FILE_PATH: config/dynamicconfig/development-sql.yaml
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CLI_ADDRESS: temporal:7233
    ports:
      - "7233:7233"
    volumes:
      - ./config/temporal/dynamicconfig:/etc/temporal/config/dynamicconfig:ro

  temporal-ui:
    image: temporalio/ui:2.39.0
    depends_on:
      - temporal
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CORS_ORIGINS: http://localhost:3000
    ports:
      - "8088:8080"

  api:
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    depends_on:
      ticket-api:
        condition: service_started
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      temporal:
        condition: service_started
    environment:
      OPSPILOT_ENV: development
      OPSPILOT_LOG_LEVEL: INFO
      OPSPILOT_API_LISTEN_ADDR: :8080
      OPSPILOT_POSTGRES_DSN: postgres://opspilot:opspilot@postgres:5432/opspilot?sslmode=disable
      OPSPILOT_TEMPORAL_ENABLED: "true"
      OPSPILOT_TEMPORAL_ADDRESS: temporal:7233
      OPSPILOT_TEMPORAL_NAMESPACE: default
      OPSPILOT_TEMPORAL_TASK_QUEUE: opspilot-report-tasks
      OPSPILOT_TICKET_API_BASE_URL: http://ticket-api:8090
      OPSPILOT_TICKET_API_TOKEN: local-dev-ticket-token
      OPSPILOT_WORKER_POLL_INTERVAL: 1s
      OPSPILOT_WORKER_SHUTDOWN_TIMEOUT: 10s
    ports:
      - "18080:8080"

  worker:
    build:
      context: .
      dockerfile: docker/worker.Dockerfile
    depends_on:
      ticket-api:
        condition: service_started
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      temporal:
        condition: service_started
    environment:
      OPSPILOT_ENV: development
      OPSPILOT_LOG_LEVEL: INFO
      OPSPILOT_API_LISTEN_ADDR: :8080
      OPSPILOT_POSTGRES_DSN: postgres://opspilot:opspilot@postgres:5432/opspilot?sslmode=disable
      OPSPILOT_TEMPORAL_ENABLED: "true"
      OPSPILOT_TEMPORAL_ADDRESS: temporal:7233
      OPSPILOT_TEMPORAL_NAMESPACE: default
      OPSPILOT_TEMPORAL_TASK_QUEUE: opspilot-report-tasks
      OPSPILOT_TICKET_API_BASE_URL: http://ticket-api:8090
      OPSPILOT_TICKET_API_TOKEN: local-dev-ticket-token
      OPSPILOT_APPROVED_TOOL_FAIL_ON_APPROVE: ${OPSPILOT_APPROVED_TOOL_FAIL_ON_APPROVE:-false}
      OPSPILOT_WORKER_POLL_INTERVAL: 1s
      OPSPILOT_WORKER_SHUTDOWN_TIMEOUT: 10s
volumes:
  postgres-data:
  temporal-postgres-data:
